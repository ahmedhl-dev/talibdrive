{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-2xl shadow-lg p-8 max-w-md mx-auto mt-6">
    <div class="text-center mb-6">
        <div class="text-5xl mb-3">⭐</div>
        <h2 class="text-2xl font-bold text-gray-800">Noter {{ cible.prenom }}</h2>
        <p class="text-gray-400 text-sm mt-1">{{ trajet.depart }} → FSJES Mohammedia</p>
    </div>
    <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="text-center">
            <div class="flex justify-center gap-2" id="star-container">
                {% for i in range(1, 6) %}
                <button type="button" class="star-btn text-4xl text-gray-300 hover:scale-110 transition" data-value="{{ i }}">★</button>
                {% endfor %}
            </div>
            <input type="hidden" name="note" id="note-input" required>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Points forts (optionnel)</label>
            <div class="flex flex-wrap gap-2">
                {% for tag in tags_options %}
                <label class="cursor-pointer">
                    <input type="checkbox" name="tags" value="{{ tag }}" class="hidden peer">
                    <span class="inline-block px-3 py-1.5 rounded-full text-sm border border-gray-200 text-gray-600 peer-checked:bg-green-700 peer-checked:text-white peer-checked:border-green-700 transition">
                        {{ tag }}
                    </span>
                </label>
                {% endfor %}
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Commentaire (optionnel)</label>
            <textarea name="commentaire" rows="3" maxlength="500" placeholder="Ex: Trajet agreable, a l'heure..."
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50"></textarea>
        </div>

        <button type="submit"
            class="w-full bg-green-700 text-white py-2.5 rounded-xl hover:bg-green-800 transition font-semibold text-sm">
            Envoyer l'avis
        </button>
    </form>
</div>

<script>
const stars = document.querySelectorAll(".star-btn");
const noteInput = document.getElementById("note-input");
let selected = 0;

function paint(value) {
    stars.forEach((s, i) => {
        s.classList.toggle("text-yellow-400", i < value);
        s.classList.toggle("text-gray-300", i >= value);
    });
}

stars.forEach((star, i) => {
    star.addEventListener("mouseenter", () => paint(i + 1));
    star.addEventListener("mouseleave", () => paint(selected));
    star.addEventListener("click", () => {
        selected = i + 1;
        noteInput.value = selected;
        paint(selected);
    });
});
</script>
{% endblock %}
