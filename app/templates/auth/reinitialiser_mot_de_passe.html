{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-2xl shadow-lg p-10 max-w-md mx-auto mt-6">
    <div class="text-center mb-8">
        <div class="text-5xl mb-3">🔐</div>
        <h2 class="text-2xl font-bold text-gray-800">Nouveau mot de passe</h2>
        <p class="text-gray-400 text-sm mt-1">Code envoye a <span class="text-green-700 font-medium">{{ email }}</span></p>
    </div>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 text-center">Code de verification</label>
            <input type="text" name="code" required maxlength="6" pattern="[0-9]{6}" placeholder="Ex: 123456"
                class="w-full border border-gray-200 rounded-xl px-4 py-3 text-center text-2xl tracking-[0.5em] font-bold focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
            <input type="password" name="nouveau_mdp" required placeholder="********"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer le mot de passe</label>
            <input type="password" name="confirmer_mdp" required placeholder="********"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <button type="submit"
            class="w-full bg-green-700 text-white py-2.5 rounded-xl hover:bg-green-800 transition font-semibold text-sm mt-2">
            Reinitialiser le mot de passe
        </button>
    </form>
    <p class="text-sm text-center mt-6 text-gray-400">
        <a href="{{ url_for('auth.mot_de_passe_oublie') }}" class="text-green-700 font-semibold hover:underline">Renvoyer un code</a>
    </p>
</div>
{% endblock %}
