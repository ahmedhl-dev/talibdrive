{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-2xl shadow-lg p-10 max-w-md mx-auto mt-6">
    <div class="text-center mb-8">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="TalibDrive" class="h-32 w-auto mx-auto my-4">
        <h2 class="text-2xl font-bold text-gray-800">🎓  Bienvenue 🎓</h2>
        <p class="text-gray-400 text-sm mt-1">Connectez-vous à votre compte TalibDrive</p>
    </div>
    <form method="POST" class="space-y-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email universitaire</label>
            <input type="email" name="email" required placeholder="vous@univ.ma"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
            <input type="password" name="mot_de_passe" required placeholder="••••••••"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <button type="submit"
            class="w-full bg-green-700 text-white py-2.5 rounded-xl hover:bg-green-800 transition font-semibold text-sm mt-2">
            Se connecter
        </button>
        <p class="text-center">
            <a href="{{ url_for('auth.mot_de_passe_oublie') }}" class="text-xs text-gray-400 hover:text-green-700 hover:underline">Mot de passe oublie ?</a>
        </p>
    </form>
    <p class="text-sm text-center mt-6 text-gray-400">Pas encore de compte ?
        <a href="{{ url_for('auth.inscription') }}" class="text-green-700 font-semibold hover:underline">S'inscrire</a>
    </p>
</div>
{% endblock %}
