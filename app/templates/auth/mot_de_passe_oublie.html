{% extends "base.html" %}
{% block content %}
<div class="bg-white rounded-2xl shadow-lg p-10 max-w-md mx-auto mt-6">
    <div class="text-center mb-8">
        <div class="text-5xl mb-3">🔑</div>
        <h2 class="text-2xl font-bold text-gray-800">Mot de passe oublie</h2>
        <p class="text-gray-400 text-sm mt-1">Entrez votre email pour recevoir un code</p>
    </div>
    <form method="POST" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email universitaire</label>
            <input type="email" name="email" required placeholder="Ex: vous@univ.ma"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <button type="submit"
            class="w-full bg-green-700 text-white py-2.5 rounded-xl hover:bg-green-800 transition font-semibold text-sm">
            Envoyer le code
        </button>
    </form>
    <p class="text-sm text-center mt-6 text-gray-400">
        <a href="{{ url_for('auth.login') }}" class="text-green-700 font-semibold hover:underline">Retour a la connexion</a>
    </p>
</div>
{% endblock %}
