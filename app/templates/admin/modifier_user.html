{% extends "base.html" %}
{% block content %}

<a href="{{ url_for('admin.index') }}" class="text-sm text-gray-400 hover:text-green-700 transition mb-6 inline-block">
    ← Retour au panneau admin
</a>

<div class="bg-white rounded-2xl shadow-lg p-10 max-w-md mx-auto mt-6">
    <div class="text-center mb-8">
        <div class="text-5xl mb-3">✏️</div>
        <h2 class="text-2xl font-bold text-gray-800">Modifier l'utilisateur</h2>
        <p class="text-gray-400 text-sm mt-1">{{ user.prenom }} {{ user.nom }}</p>
    </div>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                <input type="text" name="nom" required value="{{ user.nom }}"
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Prenom</label>
                <input type="text" name="prenom" required value="{{ user.prenom }}"
                    class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required value="{{ user.email }}"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50">
        </div>
        <div class="bg-yellow-50 border border-yellow-100 rounded-xl p-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
            <input type="password" name="nouveau_mdp" placeholder="Laisser vide pour ne pas changer"
                class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white">
            <p class="text-xs text-gray-400 mt-1">Minimum 8 caracteres si renseigne.</p>
        </div>
        <button type="submit"
            class="w-full bg-green-700 text-white py-2.5 rounded-xl hover:bg-green-800 transition font-semibold text-sm mt-2">
            Enregistrer les modifications
        </button>
    </form>
</div>

{% endblock %}
